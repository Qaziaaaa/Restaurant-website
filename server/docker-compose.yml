version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/restaurant
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - restaurant-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - restaurant-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  mongo-data:
